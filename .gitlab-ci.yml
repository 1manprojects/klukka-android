stages:
  - build

variables:
  APP_NAME: "Klukka"
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.caching=true"

.build_common: &build_common
  stage: build
  image: mingc/android-build-box:latest
  cache:
    key: "$CI_PROJECT_ID-gradle"
    paths:
      - .gradle/
      - ~/.gradle/caches/
  before_script:
    - chmod +x ./gradlew
    - |
      if [ -n "$CI_COMMIT_TAG" ]; then
        export VERSION="$CI_COMMIT_TAG"
        export PACKAGE_NAME="${APP_NAME}"
      else
        export VERSION="$CI_COMMIT_SHORT_SHA"
        export PACKAGE_NAME="${APP_NAME}-DEV"
      fi
    - echo "Building ${APP_NAME} version ${VERSION}"
    - export VERSION_CODE="${CI_PIPELINE_IID:-1}"

.publish_apk: &publish_apk
  - |
    curl --fail \
      --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
      --upload-file "${APK_PATH}" \
      "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${PACKAGE_NAME}/${VERSION}/${APK_FILENAME}"

build:unsigned:
  <<: *build_common
  script:
    - ./gradlew assembleRelease
        -PversionName="${VERSION}"
        -PversionCode="${VERSION_CODE}"
    # Generate a throwaway debug keystore
    - keytool -genkey -v -keystore /tmp/debug.jks -alias debug
        -keyalg RSA -keysize 2048 -validity 365
        -storepass android -keypass android
        -dname "CN=Debug, O=Debug, C=US"
    # Sign the APK
    - apksigner sign
        --ks /tmp/debug.jks --ks-key-alias debug
        --ks-pass pass:android --key-pass pass:android
        --out app/build/outputs/apk/release/app-release-signed.apk
        app/build/outputs/apk/release/app-release-unsigned.apk
    - export APK_PATH="app/build/outputs/apk/release/app-release-signed.apk"
    - export APK_FILENAME="${PACKAGE_NAME}-${VERSION}.apk"
    - *publish_apk
  rules:
    - if: $KEYSTORE_FILE
      when: never
    - when: always

build:signed:
  <<: *build_common
  script:
    - echo "${KEYSTORE_FILE}" | base64 -d > /tmp/release.jks
    - ./gradlew assembleRelease
        -PversionName="${VERSION}"
        -PversionCode="${VERSION_CODE}"
        -Pandroid.injected.signing.store.file=/tmp/release.jks
        -Pandroid.injected.signing.store.password="${KEYSTORE_STORE_PASSWORD}"
        -Pandroid.injected.signing.key.alias="${KEYSTORE_KEY_ALIAS}"
        -Pandroid.injected.signing.key.password="${KEYSTORE_KEY_PASSWORD}"
    - rm -f /tmp/release.jks
    # Publish signed APK
    - export APK_PATH="app/build/outputs/apk/release/app-release.apk"
    - export APK_FILENAME="${PACKAGE_NAME}-${VERSION}.apk"
    - *publish_apk
    # Publish unsigned APK alongside signed
    - export APK_PATH="app/build/outputs/apk/release/app-release-unsigned.apk"
    - export APK_FILENAME="${PACKAGE_NAME}-${VERSION}-unsigned.apk"
    - *publish_apk
  rules:
    - if: $KEYSTORE_FILE