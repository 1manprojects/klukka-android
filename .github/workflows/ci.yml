name: Build Android APK

on:
  push:
    branches:
      - main
      - master
      - develop
    tags:
      - '*'
  pull_request:
  release:
    types: [created, published]
  workflow_dispatch:

env:
  APP_NAME: "Klukka"
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.caching=true"

# Add permissions for the GITHUB_TOKEN
permissions:
  contents: write

jobs:
  build-signed:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      # Check if secrets are available - skip build if not
      - name: Check for keystore
        id: check_secrets
        run: |
          if [ -z "${{ secrets.KEYSTORE_FILE }}" ]; then
            echo "KEYSTORE_FILE secret is not set. Skipping build."
            echo "has_keystore=false" >> $GITHUB_OUTPUT
          else
            echo "has_keystore=true" >> $GITHUB_OUTPUT
          fi
      
      - name: Set up JDK 17
        if: steps.check_secrets.outputs.has_keystore == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Gradle cache
        if: steps.check_secrets.outputs.has_keystore == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      - name: Set version variables
        if: steps.check_secrets.outputs.has_keystore == 'true'
        id: version
        run: |
          # Extract tag name from different event types
          if [ "${{ github.event_name }}" == "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
            PACKAGE_NAME="${APP_NAME}"
          elif [ -n "${{ github.ref_type }}" ] && [ "${{ github.ref_type }}" == "tag" ]; then
            VERSION="${{ github.ref_name }}"
            PACKAGE_NAME="${APP_NAME}"
          else
            VERSION="${{ github.sha }}"
            VERSION="${VERSION:0:8}"
            PACKAGE_NAME="${APP_NAME}-DEV"
          fi
          
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "PACKAGE_NAME=${PACKAGE_NAME}" >> $GITHUB_ENV
          echo "VERSION_CODE=${{ github.run_number }}" >> $GITHUB_ENV
          echo "Building ${APP_NAME} version ${VERSION}"
      
      - name: Make gradlew executable
        if: steps.check_secrets.outputs.has_keystore == 'true'
        run: chmod +x ./gradlew
      
      - name: Build unsigned APK
        if: steps.check_secrets.outputs.has_keystore == 'true'
        run: |
          ./gradlew assembleRelease \
            -PversionName="${VERSION}" \
            -PversionCode="${VERSION_CODE}"
      
      - name: Decode keystore and sign APK
        if: steps.check_secrets.outputs.has_keystore == 'true'
        run: |
          # Decode keystore
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 -d > ${{ github.workspace }}/release.jks
          
          # Find the build-tools version
          BUILD_TOOLS_VERSION=$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -n 1)
          echo "Using build-tools version: $BUILD_TOOLS_VERSION"
          
          # Find the unsigned APK (could be app-release-unsigned.apk or app-release.apk)
          if [ -f "app/build/outputs/apk/release/app-release-unsigned.apk" ]; then
            UNSIGNED_APK="app/build/outputs/apk/release/app-release-unsigned.apk"
          else
            UNSIGNED_APK="app/build/outputs/apk/release/app-release.apk"
          fi
          
          echo "Signing APK: $UNSIGNED_APK"
          
          # Sign the APK
          $ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/apksigner sign \
            --ks ${{ github.workspace }}/release.jks \
            --ks-key-alias "${{ secrets.KEYSTORE_KEY_ALIAS }}" \
            --ks-pass pass:"${{ secrets.KEYSTORE_STORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.KEYSTORE_KEY_PASSWORD }}" \
            --out app/build/outputs/apk/release/app-release-signed.apk \
            $UNSIGNED_APK
          
          # Move signed APK to expected location
          mv app/build/outputs/apk/release/app-release-signed.apk app/build/outputs/apk/release/app-release.apk
      
      - name: Verify APK signature
        if: steps.check_secrets.outputs.has_keystore == 'true'
        run: |
          BUILD_TOOLS_VERSION=$(ls $ANDROID_HOME/build-tools/ | sort -V | tail -n 1)
          echo "Verifying APK signature..."
          $ANDROID_HOME/build-tools/$BUILD_TOOLS_VERSION/apksigner verify --verbose app/build/outputs/apk/release/app-release.apk
          echo "✅ APK signature verified successfully!"
      
      - name: Clean up keystore
        if: always()
        run: rm -f ${{ github.workspace }}/release.jks
      
      - name: Rename APK
        if: steps.check_secrets.outputs.has_keystore == 'true'
        run: |
          APK_FILENAME="${PACKAGE_NAME}-${VERSION}.apk"
          mv app/build/outputs/apk/release/app-release.apk "${APK_FILENAME}"
          echo "APK_FILENAME=${APK_FILENAME}" >> $GITHUB_ENV
          echo "✅ APK renamed to: ${APK_FILENAME}"
      
      - name: Upload APK artifact
        if: steps.check_secrets.outputs.has_keystore == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_FILENAME }}
          path: ${{ env.APK_FILENAME }}
          retention-days: 30
      
      - name: Upload APK to Release
        if: steps.check_secrets.outputs.has_keystore == 'true' && (github.ref_type == 'tag' || github.event_name == 'release')
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || github.ref_name }}
          files: ${{ env.APK_FILENAME }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
