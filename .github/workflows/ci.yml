name: Build Android APK

on:
  push:
    branches:
      - main
      - master
      - develop
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

env:
  APP_NAME: "Klukka"
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.caching=true"

jobs:
  build-signed:
    runs-on: ubuntu-latest
    # Only run if keystore secrets are configured
    if: ${{ secrets.KEYSTORE_FILE != '' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - name: Setup Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      
      - name: Set version variables
        id: version
        run: |
          if [ -n "${{ github.ref_type }}" ] && [ "${{ github.ref_type }}" == "tag" ]; then
            VERSION="${{ github.ref_name }}"
            PACKAGE_NAME="${APP_NAME}"
          else
            VERSION="${{ github.sha }}"
            VERSION="${VERSION:0:8}"
            PACKAGE_NAME="${APP_NAME}-DEV"
          fi
          
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "PACKAGE_NAME=${PACKAGE_NAME}" >> $GITHUB_ENV
          echo "VERSION_CODE=${{ github.run_number }}" >> $GITHUB_ENV
          echo "Building ${APP_NAME} version ${VERSION}"
      
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 -d > /tmp/release.jks
      
      - name: Build signed APK
        run: |
          ./gradlew assembleRelease \
            -PversionName="${VERSION}" \
            -PversionCode="${VERSION_CODE}" \
            -Pandroid.injected.signing.store.file=/tmp/release.jks \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_STORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEYSTORE_KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEYSTORE_KEY_PASSWORD }}"
      
      - name: Clean up keystore
        if: always()
        run: rm -f /tmp/release.jks
      
      - name: Rename APK
        run: |
          APK_FILENAME="${PACKAGE_NAME}-${VERSION}.apk"
          mv app/build/outputs/apk/release/app-release.apk "${APK_FILENAME}"
          echo "APK_FILENAME=${APK_FILENAME}" >> $GITHUB_ENV
      
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_FILENAME }}
          path: ${{ env.APK_FILENAME }}
          retention-days: 30
      
      - name: Create GitHub Release (for tags)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.APK_FILENAME }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}